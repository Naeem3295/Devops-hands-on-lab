name: React CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: "3. aws-react-cicd-pipeline"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Deploy to Web Server
        run: |
          rm -rf /tmp/react-build
          mkdir -p /tmp/react-build

          cp -r dist/* /tmp/react-build/

          scp -o StrictHostKeyChecking=no -r /tmp/react-build/* ubuntu@10.0.2.143:/tmp/react-build/

          ssh -o StrictHostKeyChecking=no ubuntu@10.0.2.143 << 'EOF'
            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/react-build/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo systemctl restart nginx
          EOF